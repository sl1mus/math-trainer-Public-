
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Math Trainer v0.3 Demo</title>
  <link rel="stylesheet" href="../src/components/SequenceOrderTask.css">
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;margin:20px;background:#f6f8fa;color:#263238}</style>
</head>
<body>
  <h1>Демо: последовательность по клику (v0.3)</h1>
  <div id="task"></div>
  <script src="../src/utils/storage.js"></script>
  <script src="../src/components/SequenceOrderTask.js"></script>
  <script>
    // Example: generate simple expressions and their sums
    const items = ['3+4','5+2','2+9','1+8'];
    const sums = items.map(s => eval(s));
    const correctOrder = sums
      .map((v,i)=>({v,i}))
      .sort((a,b)=>a.v-b.v)
      .map(o=>o.i);

    const task = new SequenceOrderTask({
      container: document.getElementById('task'),
      items,
      correctOrder,
      onFinish: async (ok, attempts) => {
        const store = createStorage({userId: 'demo-user', driver: 'local'});
        const stat = await store.get('seq_stat') || { solved: 0, failed: 0, attempts: 0 };
        stat.attempts += attempts;
        if (ok) stat.solved++; else stat.failed++;
        await store.set('seq_stat', stat);
        console.log('saved stat', stat);
      }
    });
  </script>
</body>
</html>
