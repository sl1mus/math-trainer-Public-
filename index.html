<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#06070f"/>
  <meta name="description" content="Математический тренажёр 4 класс — Программа Петерсон"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Математический тренажёр · 4 класс</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="SRC/components/SequenceOrderTask.css"/>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-sigma">Σ</div>
        <div class="brand-text">
          <div class="brand-name">МАТЕМАТИЧЕСКИЙ ТРЕНАЖЁР</div>
          <div class="brand-sub">4 класс · Программа Петерсон</div>
        </div>
      </div>
      <span class="version">v0.5</span>
    </div>
  </header>

  <main class="container">

    <section id="intro">
      <div id="global-stats" class="global-stats hidden"></div>
      <div class="topics-header">
        <h2>Выберите тему</h2>
        <p class="topics-sub">15 тем · 90+ заданий · Программа Петерсон</p>
      </div>
      <div id="lesson-list" class="lesson-list"></div>
    </section>

    <section id="exercise-area" class="hidden">
      <div class="exercise-topbar">
        <button id="back-to-lessons" class="btn btn-ghost-sm">← Темы</button>
        <h2 id="lesson-title" class="exercise-title"></h2>
        <div id="progress" class="progress"></div>
      </div>
      <div id="exercise-body" class="exercise-card"></div>
      <div class="actions">
        <button id="hint-btn" class="btn btn-outline">Подсказка</button>
        <button id="check-btn" class="btn btn-primary">Проверить</button>
        <button id="next-btn" class="btn btn-primary hidden">Дальше →</button>
      </div>
    </section>

    <section id="summary-area" class="hidden">
      <div class="card">
        <h2>Итоги блока</h2>
        <div id="summary-body"></div>
        <div class="summary-actions">
          <button id="to-lessons-from-summary" class="btn btn-secondary">← К темам</button>
          <button id="retry-wrong-btn" class="btn btn-outline hidden">Повторить ошибки</button>
        </div>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <small>© 2025 · Open-source на GitHub Pages · MIT License</small>
  </footer>

  <script src="SRC/components/SequenceOrderTask.js"></script>
  <script src="app.js"></script>
</body>
</html>
