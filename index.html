<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Математический тренажёр 4 класс — v0.3</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="SRC/components/SequenceOrderTask.css"/>
</head>
<body>
  <header class="app-header">
    <h1>Математический тренажёр • 4 класс</h1>
    <span class="version">v0.3</span>
  </header>

  <main class="container">
    <section id="intro" class="card">
      <h2>Выбор темы</h2>
      <p>Программа: <strong>Петерсон</strong>. Повторение 1–3 классов + темы 4 класса. Русский интерфейс.</p>
      <div id="lesson-list" class="lesson-list"></div>
    </section>

    <section id="exercise-area" class="card hidden">
      <div class="exercise-header">
        <button id="back-to-lessons" class="btn btn-secondary">← Темы</button>
        <h2 id="lesson-title">Тема</h2>
        <div id="progress" class="progress"></div>
      </div>

      <div id="exercise-body"></div>

      <div class="actions">
        <button id="hint-btn" class="btn btn-outline">Подсказка</button>
        <button id="check-btn" class="btn btn-primary">Проверить</button>
        <button id="next-btn" class="btn btn-primary hidden">Дальше</button>
      </div>
    </section>

    <section id="summary-area" class="card hidden">
      <h2>Итоги блока</h2>
      <div id="summary-body"></div>
      <button id="to-lessons-from-summary" class="btn btn-secondary">Вернуться к темам</button>
    </section>
  </main>

  <footer class="app-footer">
    <small>© 2025, Open-source на GitHub Pages</small>
  </footer>

  <script src="SRC/components/SequenceOrderTask.js"></script>
  <script src="app.js"></script>
</body>
</html>
